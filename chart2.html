// ===============================
// GRID CHARTS
// ===============================
let chartObjects = {}; // store chart instances

function updateGridCharts() {
    const month = document.getElementById("monthSelect").value;
    const container = document.getElementById("gridContainer");

    // Clear previous charts
    container.innerHTML = "";

    // Create a card + canvas for each item
    Object.keys(weights).forEach(item => {
        const card = document.createElement("div");
        card.classList.add("card");

        const title = document.createElement("h3");
        title.textContent = item + " Index";
        card.appendChild(title);

        const canvas = document.createElement("canvas");
        canvas.id = item + "Chart";
        card.appendChild(canvas);

        container.appendChild(card);

        // Draw the chart
        const data = monthlyData[month][item];
        chartObjects[item] = new Chart(canvas, {
            type:"line",
            data:{
                labels:dates,
                datasets:[{
                    label: month + " " + item,
                    data:data,
                    borderColor:"#38bdf8",
                    backgroundColor:"rgba(56,189,248,0.2)",
                    tension:0.4,
                    fill:true,
                    pointRadius:4
                }]
            },
            options:{
                responsive:true,
                plugins:{
                    legend:{labels:{color:"white"}}
                },
                scales:{
                    x:{ticks:{color:"white"}},
                    y:{ticks:{color:"white"}}
                }
            }
        });

    });
}
